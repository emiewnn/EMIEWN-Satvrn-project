<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMIEWN | Resource Hub</title>
    <link rel="stylesheet" href="/assets/style.BdODQK01.css">
    <link rel="icon" href="/logo.ico">
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { max-width: 800px; width: 90%; text-align: center; padding: 2rem; background: #2a2a2a; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #fff; font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #aaa; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .card { background: #3a3a3a; padding: 1.5rem; border-radius: 8px; text-decoration: none; color: white; transition: transform 0.2s, background 0.2s; border: 1px solid #444; }
        .card:hover { transform: translateY(-5px); background: #4a4a4a; border-color: #666; }
        .card h2 { margin: 0; font-size: 1.2rem; color: #eee; }
        .footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #444; }
        .discord-btn { display: inline-block; background: #5865F2; color: white; padding: 0.7rem 1.5rem; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 1rem; }
        .discord-btn:hover { background: #4752C4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>EMIEWN Hub</h1>
        <p>All essential editing resources in one place.</p>
        
        <div class="grid">
            <a href="/windows" class="card"><h2>Windows</h2></a>
            <a href="/mac" class="card"><h2>MacOS</h2></a>
            <a href="/extensions" class="card"><h2>Extensions & Scripts</h2></a>
            <a href="/beginnersguide" class="card"><h2>Beginner's Guide</h2></a>
            <a href="/gcc" class="card"><h2>Adobe Fixes (GCC)</h2></a>
            <a href="/websites" class="card"><h2>Helpful Websites</h2></a>
        </div>

        <div class="footer">
            <p>Join our community for updates:</p>
            <a href="https://discord.gg/HWDcmXwbXR" target="_blank" class="discord-btn">Join Discord Server</a>
        </div>
    </div>
</body>
</html>
